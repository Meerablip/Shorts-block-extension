<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shorts & Reels Blocker</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🛡️</div>
      <h1>Focus Mode</h1>
    </div>

    <!-- Shorts & Reels Blocker Section -->
    <div class="section-container">
      <h2 class="section-title">Shorts & Reels</h2>
      
      <!-- Shorts Active Timer View -->
      <div id="shorts-active-view" class="view hidden">
        <p class="status-text">Blocking is active. Stay focused!</p>
        <div class="timer-display" id="shorts-popup-timer">00:00:00</div>
        <p class="warning-text">Block cannot be cancelled early.</p>
      </div>

      <!-- Shorts Set Block View -->
      <div id="shorts-setup-view" class="view">
        <p class="desc">Select how long to block short-form content.</p>
        <div class="duration-options">
          <button class="duration-btn shorts-duration" data-hours="1">1 hr</button>
          <button class="duration-btn shorts-duration" data-hours="3">3 hrs</button>
          <button class="duration-btn shorts-duration" data-hours="5">5 hrs</button>
          <button class="duration-btn shorts-duration" data-hours="24">24 hrs</button>
        </div>
        <div class="custom-duration">
          <input type="number" id="shorts-custom-hours" min="0.5" step="0.5" placeholder="Custom hrs">
          <button id="shorts-start-custom-btn" class="primary-btn">Start</button>
        </div>
      </div>
    </div>

    <hr class="divider">

    <!-- Full YouTube Blocker Section -->
    <div class="section-container">
      <h2 class="section-title">Entire YouTube</h2>
      
      <!-- YT Active Timer View -->
      <div id="yt-active-view" class="view hidden">
        <p class="status-text">YouTube is fully blocked.</p>
        <div class="timer-display" id="yt-popup-timer">00:00:00</div>
        <p class="warning-text">Block cannot be cancelled early.</p>
      </div>

      <!-- YT Set Block View -->
      <div id="yt-setup-view" class="view">
        <p class="desc">Select how long to block the entire site.</p>
        <div class="duration-options">
          <button class="duration-btn yt-duration" data-hours="1">1 hr</button>
          <button class="duration-btn yt-duration" data-hours="3">3 hrs</button>
          <button class="duration-btn yt-duration" data-hours="5">5 hrs</button>
          <button class="duration-btn yt-duration" data-hours="24">24 hrs</button>
        </div>
        <div class="custom-duration">
          <input type="number" id="yt-custom-hours" min="0.5" step="0.5" placeholder="Custom hrs">
          <button id="yt-start-custom-btn" class="primary-btn">Start</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../core/storageManager.js"></script>
  <script src="../core/timerManager.js"></script>
  <script src="popup.js"></script>
</body>
</html>
